<div class="enrollment-container">

    <h1>📝 Student Enrollment Request</h1>

    <form
        #enrollForm="ngForm"
        (ngSubmit)="onSubmit(enrollForm)">

        <!-- Student Name -->

        <div class="form-group">

            <label>Student Name</label>

            <input
                type="text"
                name="studentName"
                [(ngModel)]="student.studentName"
                #nameCtrl="ngModel"
                required
                minlength="3"
                placeholder="Enter Student Name">

            <small
                class="error"
                *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']">

                Name is required

            </small>

            <small
                class="error"
                *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']">

                Name must be at least 3 characters

            </small>

        </div>

        <!-- Student Email -->

        <div class="form-group">

            <label>Email Address</label>

            <input
                type="email"
                name="studentEmail"
                [(ngModel)]="student.studentEmail"
                #emailCtrl="ngModel"
                required
                email
                placeholder="Enter Email">

            <small
                class="error"
                *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">

                Email is required

            </small>

            <small
                class="error"
                *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">

                Enter a valid email address

            </small>

        </div>

        <!-- Course ID -->

        <div class="form-group">

            <label>Course ID</label>

            <input
                type="number"
                name="courseId"
                [(ngModel)]="student.courseId"
                #courseCtrl="ngModel"
                required
                placeholder="Enter Course ID">

            <small
                class="error"
                *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']">

                Course ID is required

            </small>

        </div>

        <!-- Semester -->

        <div class="form-group">

            <label>Preferred Semester</label>

            <select
                name="preferredSemester"
                [(ngModel)]="student.preferredSemester"
                required
                #semesterCtrl="ngModel">

                <option value="">Select Semester</option>
                <option value="Odd">Odd</option>
                <option value="Even">Even</option>

            </select>

            <small
                class="error"
                *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']">

                Please select a semester

            </small>

        </div>

        <!-- Terms -->

        <div class="checkbox-group">

            <input
                type="checkbox"
                name="agreeToTerms"
                [(ngModel)]="student.agreeToTerms"
                #termsCtrl="ngModel"
                required>

            <label>I agree to the Terms & Conditions</label>

        </div>

        <small
            class="error"
            *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']">

            Please accept the terms

        </small>

        <!-- Buttons -->

        <div class="button-group">

            <button
                type="submit"
                [disabled]="enrollForm.invalid">

                Submit

            </button>

            <button
type="button"
(click)="enrollForm.resetForm(); submitted=false">
Reset
</button>

        </div>

    </form>

    <div
        class="success"
        *ngIf="submitted">

        ✅ Enrollment request submitted successfully!

    </div>

</div>
